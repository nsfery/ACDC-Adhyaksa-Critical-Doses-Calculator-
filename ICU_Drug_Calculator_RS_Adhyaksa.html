<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU Drug Calculator RS Adhyaksa Jawa Timur</title>
<style>
.logo{width:90px;height:auto;margin-bottom:10px;}
.body{font-family:Cursival,Serif,sans-serif;background:#f4f7fb;margin:0}
.header{background:#0b4f8a;color:white;padding:20px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:white;border-radius:15px;padding:20px;box-shadow:0 3px 15px rgba(0,0,0,.1)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
label{font-weight:600;display:block;margin-bottom:5px}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
button{background:#0b4f8a;color:white;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
.result{font-size:28px;font-weight:bold;color:#c62828;padding:10px;background:#fff3f3;border-radius:10px}
.footer{margin-top:20px;color:#666;font-size:12px}
</style>
</head>
<div class="background-icons">

💉 💊 💉 💊 💉 💊 💉 💊
💊 💉 💊 💉 💊 💉 💊 💉
💉 💊 💉 💊 💉 💊 💉 💊

<body>
</div>
<div class="header">
<img src="logo-rs.png" class="logo">
<h1>ACDC (Adhyaksa Critical Doses Calculator)</h1>
<p>Developed by ICU RS Adhyaksa Jawa Timur</p>
</div>

<div class="container">
<div class="card">

<h2>Data Pasien</h2>
<div class="grid">
<div><label>Nama Pasien</label><input id="nama"></div>
<div><label>No Rekam Medis</label><input id="rm"></div>
<div><label>Usia</label><input id="usia" type="number"></div>
<div><label>Berat Badan (kg)</label><input id="bb" type="number"></div>
</div>

<h2>Data Obat</h2>
<div class="grid">
<div>
<label>Nama Obat</label>
<select id="obat" onchange="updateMix()">
<option value="">Pilih Obat</option>
<option value="NE4">Norepinephrine 4 mg up to 50 mL</option>
<option value="NE8">Norepinephrine 8 mg up to 50 mL</option>
<option value="EPI4">Epinephrine 4 mg up to 50 mL</option>
<option value="EPI8">Epinephrine 8 mg up to 50 mL</option>
<option value="DOBU">Dobutamine 250 mg up to 50 mL</option>
<option value="DOPA">Dopamine 200 mg up to 40 mL</option>
<option value="DEX">Dexmedetomidine 200 mcg up to 50 mL</option>
</select>
</div>

<div>
<label>Dosis Pengoplosan</label>
<input id="mix" readonly>
</div>

<div>
<label>Dosis Target (mcg/kg/min)</label>
<input id="dose" type="number" step="0.01">
</div>

<div>
<label>Hasil Infus</label>
<div id="hasil" class="result">0.00 mL/jam</div>
</div>
</div>

<br>
<button onclick="hitung()">Hitung Dosis</button>
<button onclick="window.print()">Cetak</button>

<h2>Verifikasi</h2>
<div class="grid">
<div><label>Checker</label><input id="checker"></div>
<div><label>Giver</label><input id="giver"></div>
</div>

<div class="footer">
Untuk penggunaan klinis wajib dilakukan verifikasi oleh dokter dan perawat yang berwenang.
</div>

</div>
</div>

<script>
const drugs={
NE4:{mix:"4 mg + NS/D5 hingga 50 mL",conc:80},
NE8:{mix:"8 mg + NS/D5 hingga 50 mL",conc:160},
EPI4:{mix:"4 mg + NS/D5 hingga 50 mL",conc:80},
EPI8:{mix:"8 mg + NS/D5 hingga 50 mL",conc:160},
DOBU:{mix:"250 mg + NS/D5 hingga 50 mL",conc:5000},
DOPA:{mix:"200 mg + NS/D5 hingga 40 mL",conc:5000},
DEX:{mix:"200 mcg + NS/D5 hingga 50 mL",conc:4}
};

function updateMix(){
const o=document.getElementById("obat").value;
document.getElementById("mix").value=o?drugs[o].mix:"";
}

function hitung(){
const bb=parseFloat(document.getElementById("bb").value);
const dose=parseFloat(document.getElementById("dose").value);
const obat=document.getElementById("obat").value;

if(!bb||!dose||!obat){
alert("Lengkapi data pasien dan obat.");
return;
}

const rate=(dose*bb*60)/drugs[obat].conc;
document.getElementById("hasil").innerHTML=rate.toFixed(2)+" mL/jam";
}
</script>
</body>
</html>
